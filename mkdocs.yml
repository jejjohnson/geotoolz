      - API Reference:
          - Overview: catalog/api/reference.md
          - Catalogs & backends: catalog/api/catalogs.md
          - GeoSlice & grid alignment: catalog/api/geoslice.md
          - Loaders: catalog/api/loaders.md
          - GeoParquet interchange: catalog/api/geoparquet.md
          - Discovery sources & bundle: catalog/api/sources.md
          - Matchup engine: catalog/api/matchup.md
          - Staging & the patcher bridge: catalog/api/staging.md
      - CLI: catalog/cli.md
      - Schema versions: catalog/schema-versions.md
      - Logging: catalog/logging.md
      - Design:
          - Exact grid alignment: catalog/design/exact-grid-alignment.md
          - Query & matchup: catalog/design/query-matchup.md
      - Changelog: catalog/changelog.md
  - Extended examples ↗: https://github.com/jejjohnson/research_notebook/tree/main/projects/geostack
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
