site_name: geotoolz
site_description: Composable Operator library for remote sensing on top of georeader.GeoTensor.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/geotoolz
repo_name: jejjohnson/geotoolz

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Quickstart: quickstart.md
  - Recipes:
      - Define an operator: recipes/define-an-operator.md
      - Branching pipelines: recipes/branching-pipelines.md
      - Integration with geocatalog & geopatcher: recipes/integration-with-geocatalog-and-geopatcher.md
  - Tutorials:
      - Operators on Sentinel-2 (Lake Tahoe): notebooks/operators_lake_tahoe.ipynb
      - Composition core walkthrough: notebooks/composition_core.ipynb
      - Pipeline idioms: notebooks/pipeline_idioms.ipynb
      - Deployment shapes: notebooks/deployment_shapes.ipynb
      - Catalog ↔ patching: notebooks/catalog_patching.ipynb
      - Image processing (radiometry + cloud + indices): notebooks/image_processing.ipynb
  - Module guides:
      - Normalization: normalization.md
      - Multi-format readers: io.md
      - Adding a sensor reader: readers.md
  - API Reference:
      - Core: api/core.md
      - Augment: api/augment.md
      - Cloud: api/cloud.md
      - Compositing: api/compositing.md
      - Feature: api/feature.md
      - Geometry: api/geom.md
      - Indices: api/indices.md
      - IO: api/io.md
      - Learn (scikit-learn): api/learn.md
      - Mask: api/mask.md
      - Matched filter: api/matched_filter.md
      - Measure: api/measure.md
      - Normalize: api/normalize.md
      - Plume: api/plume.md
      - QA: api/qa.md
      - Radiometry: api/radiometry.md
      - Readers: api/readers.md
      - Restore: api/restore.md
      - Segment: api/segment.md
      - Spectral: api/spectral.md
      - Viz: api/viz.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
