site_name: geotoolz
site_description: The geotoolz geostack — RS operators, the four-axis Patcher, and a spatiotemporal catalog, composable end to end.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/geotoolz
repo_name: jejjohnson/geotoolz

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/geotoolz/src
            - packages/geotoolz-patcher/src
            - packages/geotoolz-catalog/src
          options:
            docstring_style: google
            # Parse `Returns:  X: desc` as *type: description* (not as a
            # named value), so typed return docstrings resolve cleanly.
            docstring_options:
              returns_named_value: false
            show_source: true
            show_root_heading: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - The geostack: geostack.md
  - Operators — geotoolz:
      - Concepts: concepts.md
      - Quickstart: quickstart.md
      - Recipes:
          - Define an operator: recipes/define-an-operator.md
          - Branching pipelines: recipes/branching-pipelines.md
          - Catalog → patch → operate: recipes/integration-with-geocatalog-and-geopatcher.md
      - Tutorial:
          - Operators on Sentinel-2 (Lake Tahoe): notebooks/operators_lake_tahoe.ipynb
      - Module guides:
          - Normalization: normalization.md
          - Patching (tile / stitch / sample): patch_ops.md
          - Multi-format readers: io.md
          - Adding a sensor reader: readers.md
      - API Reference:
          - Core: api/core.md
          - Augment: api/augment.md
          - Cloud: api/cloud.md
          - Compositing: api/compositing.md
          - Einx: api/einx.md
          - Feature: api/feature.md
          - Geometry: api/geom.md
          - Indices: api/indices.md
          - IO: api/io.md
          - Learn (scikit-learn): api/learn.md
          - Mask: api/mask.md
          - Matched filter: api/matched_filter.md
          - Measure: api/measure.md
          - Normalize: api/normalize.md
          - Plume: api/plume.md
          - QA: api/qa.md
          - Radiometry: api/radiometry.md
          - Readers: api/readers.md
          - Restore: api/restore.md
          - Segment: api/segment.md
          - Spectral: api/spectral.md
          - Viz: api/viz.md
      - Design:
          - Query → matchup → patch: design/query-matchup.md
  - Patcher — geopatcher:
      - Home: patcher/index.md
      - Concepts: patcher/concepts.md
      - Quickstart: patcher/quickstart.md
      - Recipes:
          - Streaming overlap-add: patcher/recipes/streaming-overlap-add.md
          - On-error policies: patcher/recipes/on-error-policies.md
          - Journal & resume: patcher/recipes/journal-and-resume.md
          - Temporal stencils: patcher/recipes/temporal-stencils.md
          - xarray N-D patching: patcher/recipes/xarray-nd-patching.md
      - Tutorial:
          - Patching Sentinel-2 (Lake Tahoe): patcher/notebooks/patcher_lake_tahoe.ipynb
      - Reference:
          - Patching: patcher/patching.md
          - Observability hooks: patcher/observability.md
          - Async and prefetch: patcher/patching/async-prefetch.md
      - API Reference:
          - Overview: patcher/api/reference.md
          - Core framework: patcher/api/core.md
          - Spatial axes: patcher/api/spatial.md
          - Temporal axes: patcher/api/temporal.md
          - ML utilities: patcher/api/ml.md
          - Matched multi-source: patcher/api/matched.md
          - Integrations: patcher/api/integrations.md
      - Design:
          - Design decisions: patcher/decisions.md
          - Query → matchup → patch: patcher/design/query-matchup.md
  - Catalog — geocatalog:
      - Home: catalog/index.md
      - Concepts: catalog/concepts.md
      - Quickstart: catalog/quickstart.md
      - Recipes:
