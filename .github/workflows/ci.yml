name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-packages --all-groups --all-extras
      # Fast tier only — `slow` / `integration` tests run manually via the
      # "Extended Tests" workflow (workflow_dispatch), never automatically.
      # Each package runs from its own directory so its pytest + coverage
      # config (markers, gates, bench ignores) applies unchanged.
      - name: Test geotoolz
        run: uv run pytest -v -m "not slow and not integration"
        working-directory: packages/geotoolz
      - name: Test geotoolz-patcher
        run: uv run pytest -v
        working-directory: packages/geotoolz-patcher
      - name: Test geotoolz-catalog
        run: uv run pytest -v
        working-directory: packages/geotoolz-catalog
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: packages/*/coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: packages/geotoolz/coverage.xml,packages/geotoolz-patcher/coverage.xml,packages/geotoolz-catalog/coverage.xml
          fail_ci_if_error: false
