name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install typecheck dependencies
        run: uv sync --group typecheck
      - name: Typecheck geotoolz
        run: uv run --group typecheck ty check src/geotoolz
        working-directory: packages/geotoolz
      - name: Typecheck geotoolz-patcher
        run: uv run --group typecheck ty check src/geopatcher
        working-directory: packages/geotoolz-patcher
      - name: Typecheck geotoolz-catalog
        run: uv run --group typecheck ty check src/geocatalog
        working-directory: packages/geotoolz-catalog
